<!DOCTYPE html>
<html>
<head>
<title>Expo Go QR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; margin:0; background:#111; font-family:sans-serif; color:#fff; }
  #qr { background:#fff; padding:16px; border-radius:8px; margin:16px 0; }
  code { background:#222; padding:8px 16px; border-radius:6px; font-size:18px; }
</style>
</head>
<body>
  <h2>Scan with Expo Go</h2>
  <div id="qr"></div>
  <code>exp://xavuxwq-anonymous-8081.exp.direct</code>
  <p style="color:#aaa;font-size:13px">Public tunnel — works on any network</p>
  <script>
    new QRCode(document.getElementById("qr"), {
      text: "exp://xavuxwq-anonymous-8081.exp.direct",
      width: 256,
      height: 256
    });
  </script>
</body>
</html>
